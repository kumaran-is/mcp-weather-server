version: '3.8'

services:
  mcp-weather-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    env_file:
      - .env
    environment:
      # Override specific values for Docker deployment if needed
      # These will override values from .env file
      - NODE_ENV=${NODE_ENV:-production}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MCP_HTTP_PORT:-8080}/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
