name: Performance Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  # Job 1: Bundle Size Analysis
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Distribution Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/* | sort -rh >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          TOTAL_SIZE=$(du -sk dist | cut -f1)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total size:** ${TOTAL_SIZE}KB" >> $GITHUB_STEP_SUMMARY

          if [ $TOTAL_SIZE -gt 10240 ]; then
            echo "⚠️ Warning: Bundle exceeds 10MB threshold" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for large dependencies
        run: |
          echo "### Largest Dependencies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh node_modules/* | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Job 2: Startup Performance
  startup-performance:
    name: Startup Performance
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Measure cold start
        shell: bash
        run: |
          echo "Testing cold start performance on ${{ matrix.os }}..."

          for i in {1..5}; do
            START=$(date +%s%N 2>/dev/null || echo $(($(date +%s)*1000000000)))
            timeout 2s node dist/server.js > /dev/null 2>&1 || true
            END=$(date +%s%N 2>/dev/null || echo $(($(date +%s)*1000000000)))
            DIFF=$((($END - $START)/1000000))
            echo "Run $i: ${DIFF}ms"
          done
        env:
          MCP_TRANSPORT: stdio
          LOG_LEVEL: error

  # Job 3: Memory Profiling
  memory-profiling:
    name: Memory Usage Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Profile memory usage
        run: |
          node --expose-gc --max-old-space-size=256 -e "
          const startUsage = process.memoryUsage();
          console.log('Initial memory:', startUsage);

          import('./dist/server.js').then(() => {
            const beforeGC = process.memoryUsage();
            console.log('Before GC:', beforeGC);

            global.gc();

            const afterGC = process.memoryUsage();
            console.log('After GC:', afterGC);

            const heapUsed = (afterGC.heapUsed / 1024 / 1024).toFixed(2);
            const external = (afterGC.external / 1024 / 1024).toFixed(2);

            console.log(\`
            Memory Summary:
            - Heap Used: \${heapUsed}MB
            - External: \${external}MB
            - Total: \${(parseFloat(heapUsed) + parseFloat(external)).toFixed(2)}MB
            \`);

            if (parseFloat(heapUsed) > 100) {
              console.error('⚠️ High memory usage detected!');
              process.exit(1);
            }
          }).catch(err => {
            console.error('Failed to load server:', err);
            process.exit(1);
          });
          " || true

  # Job 4: Load Testing
  load-testing:
    name: Load Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          npm install -g autocannon

      - name: Build project
        run: npm run build

      - name: Start server
        run: |
          npm run http &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 5
        env:
          MCP_TRANSPORT: http
          LOG_LEVEL: error

      - name: Run load test
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Basic load test
          echo "### Basic Load Test (10 seconds, 10 connections)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          autocannon -c 10 -d 10 http://localhost:8080/health --json > load-test.json
          cat load-test.json | jq -r '.requests, .throughput, .latency' >> $GITHUB_STEP_SUMMARY || echo "Load test completed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop server
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi

  # Job 5: Benchmark Comparison
  benchmark:
    name: Benchmark Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run benchmarks
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Simple request benchmark
          node -e "
          const iterations = 1000;
          console.log(\`Testing \${iterations} weather API calls...\`);

          const times = [];
          for (let i = 0; i < iterations; i++) {
            const start = process.hrtime.bigint();
            // Simulate weather API call processing
            const data = JSON.stringify({
              temperature: Math.random() * 40,
              humidity: Math.random() * 100,
              wind_speed: Math.random() * 50
            });
            JSON.parse(data);
            const end = process.hrtime.bigint();
            times.push(Number(end - start) / 1000000);
          }

          const avg = times.reduce((a, b) => a + b, 0) / times.length;
          const sorted = times.sort((a, b) => a - b);
          const p50 = sorted[Math.floor(iterations * 0.5)];
          const p95 = sorted[Math.floor(iterations * 0.95)];
          const p99 = sorted[Math.floor(iterations * 0.99)];

          console.log(\`
          Results for \${iterations} iterations:
          - Average: \${avg.toFixed(3)}ms
          - P50: \${p50.toFixed(3)}ms
          - P95: \${p95.toFixed(3)}ms
          - P99: \${p99.toFixed(3)}ms
          \`);
          " >> $GITHUB_STEP_SUMMARY

      - name: Generate performance report
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ All performance tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY