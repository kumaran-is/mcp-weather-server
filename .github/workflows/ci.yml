name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=high
          
      - name: Run ESLint security scan
        run: npm run lint

      - name: Check for sensitive files
        run: |
          if find . -name "*.key" -o -name "*.pem" -o -name "*.env" ! -name "*.env.example" ! -name "*.env.production.example" | grep -q .; then
            echo "Sensitive files found in repository!"
            exit 1
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript compilation check
        run: npx tsc --noEmit
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Run unit tests with coverage
        run: npm run test:coverage
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          
      - name: Build project
        run: npm run build
        
      - name: Test stdio transport
        run: |
          timeout 10s npm run stdio > /dev/null 2>&1 || echo "Stdio transport test completed"
          
      - name: Test HTTP transport
        run: |
          npm run http &
          HTTP_PID=$!
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          kill $HTTP_PID || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [security, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Verify build artifacts
        run: |
          test -f dist/server.js || exit 1
          test -f dist/mcp-server.js || exit 1
          test -f dist/weather-service.js || exit 1
          echo "All build artifacts present"

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [security, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: |
          docker build -t mcp-weather-server:test .
          
      - name: Test Docker image
        run: |
          docker run --rm -d --name test-container -p 8080:8080 \
            -e MCP_TRANSPORT=http \
            mcp-weather-server:test
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-container

  validate:
    name: Project Validation
    runs-on: ubuntu-latest
    needs: [security, test, build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run complete validation
        run: |
          npm run validate || exit 1
          echo "✅ All validation checks passed"
