name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --production
          
      - name: Check for known vulnerabilities
        run: |
          npx audit-ci --moderate --production
        continue-on-error: true

      - name: Generate security report
        run: |
          npm audit --json > security-report.json || true
          
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: security-report.json

  code-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security rules
        run: |
          npm run lint
          
      - name: Check for hardcoded secrets
        run: |
          # Check for potential API keys, passwords, tokens
          if grep -r -E "(api[_-]?key|password|secret|token|auth)" src/ --include="*.ts" --include="*.js" | grep -v "// " | grep -v "* " | grep -v "process.env"; then
            echo "⚠️  Potential hardcoded secrets found!"
            echo "Please review the above matches and ensure no sensitive data is committed."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Check for unsafe patterns
        run: |
          # Check for eval, innerHTML, and other unsafe patterns
          UNSAFE_PATTERNS=0
          
          if grep -r "eval(" src/ --include="*.ts" --include="*.js"; then
            echo "❌ Found eval() usage - potential security risk"
            UNSAFE_PATTERNS=1
          fi
          
          if grep -r "innerHTML" src/ --include="*.ts" --include="*.js"; then
            echo "❌ Found innerHTML usage - potential XSS risk"
            UNSAFE_PATTERNS=1
          fi
          
          if grep -r "dangerouslySetInnerHTML" src/ --include="*.ts" --include="*.js"; then
            echo "❌ Found dangerouslySetInnerHTML usage - potential XSS risk"
            UNSAFE_PATTERNS=1
          fi
          
          if [ $UNSAFE_PATTERNS -eq 1 ]; then
            echo "🔍 Please review the above patterns for security implications"
            exit 1
          fi
          
          echo "✅ No unsafe patterns detected"

  docker-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mcp-weather-server:security-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mcp-weather-server:security-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --summary --excludePrivatePackages --onlyAllow "MIT;ISC;BSD;Apache-2.0;CC0-1.0;Unlicense" || {
            echo "❌ Found dependencies with non-approved licenses"
            echo "📋 Generating detailed license report..."
            npx license-checker --detailed > license-report.txt
            cat license-report.txt
            exit 1
          }
          echo "✅ All dependencies use approved licenses"

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, docker-scan, license-check]
    if: always()
    
    steps:
      - name: Security scan summary
        run: |
          echo "🔒 Security Scan Results Summary"
          echo "==============================="
          
          if [ "${{ needs.dependency-scan.result }}" == "success" ]; then
            echo "✅ Dependency scan: PASSED"
          else
            echo "❌ Dependency scan: FAILED"
          fi
          
          if [ "${{ needs.code-scan.result }}" == "success" ]; then
            echo "✅ Code analysis: PASSED"
          else
            echo "❌ Code analysis: FAILED"
          fi
          
          if [ "${{ needs.docker-scan.result }}" == "success" ]; then
            echo "✅ Docker scan: PASSED"
          else
            echo "❌ Docker scan: FAILED"
          fi
          
          if [ "${{ needs.license-check.result }}" == "success" ]; then
            echo "✅ License check: PASSED"
          else
            echo "❌ License check: FAILED"
          fi
          
          # Fail if any critical scans failed
          if [ "${{ needs.dependency-scan.result }}" == "failure" ] || [ "${{ needs.code-scan.result }}" == "failure" ]; then
            echo "🚨 Critical security issues detected!"
            exit 1
          fi
          
          echo "🎉 Security validation completed successfully!"
